<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>MammoCare</title>\n    <script>\n        const translations = {\n            en: { title: 'MammoCare', welcome: 'Welcome to MammoCare!' },\n            es: { title: 'MammoCare', welcome: '¡Bienvenido a MammoCare!' }\n        };\n        function showModal(id) {\n            const modal = document.getElementById(id);\n            if (modal) {\n                modal.style.display = 'block';\n            }\n        }\n        function closeModal(id) {\n            const modal = document.getElementById(id);\n            if (modal) {\n                modal.style.display = 'none';\n            }\n        }\n    <\/script>\n</head>\n<body>\n    <header>\n        <h1 id="title">{translations.en.title}</h1>\n    </header>\n    <main>\n        <section id="welcome">\n            <h2>{translations.en.welcome}</h2>\n        </section>\n        <button onclick="showModal('infoModal')">Show Info</button>\n        <div id="infoModal" style="display: none;">\n            <span onclick="closeModal('infoModal')">&times;</span>\n            <p>This is the information modal.</p>\n        </div>\n    </main>\n    <footer>\n        <p>© 2026 MammoCare</p>\n    </footer>\n</body>\n</html>
